name: Dev Container Features - CI

on:
  workflow_dispatch:
  push:
    tags: [v*]
    paths:
      - devcontainer-features/**

  pull_request:
    paths:
      - devcontainer-features/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Dev Container Features
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          validate-only: true
          base-path-to-features: ./devcontainer-features/src

  test-autogenerated:
    name: Test (autogenerated)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        base-image:
          - debian:latest
        features:
          - session-manager-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Dev Containers CLI
        run: npm install --global @devcontainers/cli

      - name: Run autogenerated tests
        run: |
          devcontainer features test \
            --skip-scenarios \
            --features '${{ matrix.features }}' \
            --base-image '${{ matrix.base-image }}' \
            ./devcontainer-features

  test-scenarios:
    name: Test (scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        base-image:
          - debian:latest
        features:
          - session-manager-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Dev Containers CLI
        run: npm install --global @devcontainers/cli

      - name: Run scenario tests
        run: |
          devcontainer features test \
            --skip-autogenerated \
            --skip-duplicated \
            --features '${{ matrix.features }}' \
            --base-image '${{ matrix.base-image }}' \
            ./devcontainer-features

  test-global:
    name: Test (global)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        base-image:
          - debian:latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Dev Containers CLI
        run: npm install --global @devcontainers/cli

      - name: Run global tests
        run: |
          devcontainer features test \
            --global-scenarios-only \
            --base-image '${{ matrix.base-image }}' \
            ./devcontainer-features
